<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="220" fill="#0d0d14"/>

  <!-- subtle grid -->
  <line x1="0" y1="73" x2="1200" y2="73" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="0" y1="147" x2="1200" y2="147" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="220" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="220" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>
  <line x1="900" y1="0" x2="900" y2="220" stroke="#ffffff" stroke-opacity="0.025" stroke-width="0.5"/>

  <!-- constellation lines -->
  <line x1="920" y1="38" x2="988" y2="76" stroke="#c084fc" stroke-opacity="0.2" stroke-width="0.6"/>
  <line x1="988" y1="76" x2="1060" y2="48" stroke="#c084fc" stroke-opacity="0.2" stroke-width="0.6"/>
  <line x1="988" y1="76" x2="1010" y2="140" stroke="#c084fc" stroke-opacity="0.15" stroke-width="0.6"/>
  <line x1="1010" y1="140" x2="1080" y2="168" stroke="#c084fc" stroke-opacity="0.12" stroke-width="0.6"/>
  <line x1="1010" y1="140" x2="960" y2="178" stroke="#c084fc" stroke-opacity="0.12" stroke-width="0.6"/>
  <line x1="1060" y1="48" x2="1130" y2="36" stroke="#c084fc" stroke-opacity="0.1" stroke-width="0.6"/>
  <line x1="920" y1="38" x2="870" y2="88" stroke="#c084fc" stroke-opacity="0.1" stroke-width="0.6"/>
  <line x1="1080" y1="168" x2="1150" y2="190" stroke="#c084fc" stroke-opacity="0.08" stroke-width="0.6"/>

  <!-- constellation nodes -->
  <circle cx="920" cy="38" r="2.2" fill="#e2b6ff" fill-opacity="0.65"/>
  <circle cx="988" cy="76" r="3.5" fill="#c084fc" fill-opacity="0.9"/>
  <circle cx="1060" cy="48" r="2.0" fill="#e2b6ff" fill-opacity="0.6"/>
  <circle cx="1010" cy="140" r="2.8" fill="#c084fc" fill-opacity="0.75"/>
  <circle cx="1080" cy="168" r="1.8" fill="#e2b6ff" fill-opacity="0.45"/>
  <circle cx="960" cy="178" r="1.6" fill="#e2b6ff" fill-opacity="0.4"/>
  <circle cx="870" cy="88" r="1.5" fill="#e2b6ff" fill-opacity="0.35"/>
  <circle cx="1130" cy="36" r="1.4" fill="#e2b6ff" fill-opacity="0.3"/>
  <circle cx="1150" cy="190" r="1.2" fill="#e2b6ff" fill-opacity="0.25"/>

  <!-- scattered micro stars -->
  <circle cx="80" cy="24" r="1.0" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="180" cy="58" r="0.8" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="44" cy="160" r="0.9" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="720" cy="18" r="1.0" fill="#ffffff" fill-opacity="0.2"/>
  <circle cx="640" cy="200" r="0.8" fill="#ffffff" fill-opacity="0.15"/>
  <circle cx="760" cy="195" r="1.1" fill="#c084fc" fill-opacity="0.22"/>
  <circle cx="30" cy="110" r="0.7" fill="#ffffff" fill-opacity="0.15"/>
  <circle cx="500" cy="12" r="0.9" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="820" cy="205" r="0.7" fill="#ffffff" fill-opacity="0.12"/>

  <!-- name — centered -->
  <text
    x="600" y="108"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="400"
    letter-spacing="6"
    fill="#ffffff"
    fill-opacity="0.96"
    text-anchor="middle"
  >Theo Korir</text>

  <!-- thin accent line under name -->
  <line x1="340" y1="124" x2="860" y2="124" stroke="#c084fc" stroke-opacity="0.3" stroke-width="0.5"/>

  <!-- subtitle — centered -->
  <text
    x="600" y="152"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="5"
    fill="#c084fc"
    fill-opacity="0.7"
    text-anchor="middle"
  >FULL-STACK  ·  AI / ML  ·  APPLIED RESEARCH  ·  NAIROBI</text>

  <!-- tagline — centered -->
  <text
    x="600" y="185"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="300"
    fill="#ffffff"
    fill-opacity="0.3"
    text-anchor="middle"
  >if it can be built, I'll build it.</text>

  <!-- signal dot bottom left -->
  <circle cx="48" cy="198" r="3.5" fill="none" stroke="#c084fc" stroke-opacity="0.35" stroke-width="0.8"/>
  <circle cx="48" cy="198" r="1.3" fill="#c084fc" fill-opacity="0.5"/>
  <line x1="56" y1="198" x2="86" y2="198" stroke="#c084fc" stroke-opacity="0.18" stroke-width="0.5"/>
  <text
    x="92" y="202"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="9"
    letter-spacing="2.5"
    fill="#c084fc"
    fill-opacity="0.3"
  >NAIROBI · SIGNAL OPEN</text>
</svg>
